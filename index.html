<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taco Roulette - Monterrey Edition</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/logotipo_reducción.svg">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #0F3822;
            --primary-yellow: #FEDB5B;
            --accent-gray: #CBBEB6;
            --light-cream: #FEF9F0;
            --white: #FFFFFF;
            --dark: #0F3822;
        }

        @keyframes bounce-in {
            0% { 
                opacity: 0;
                transform: scale(0.3) translateY(30px);
            }
            70% {
                transform: scale(1.05);
            }
            100% { 
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes slide-in-up {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes particle-rise {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0);
            }
        }

        @keyframes expand {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 1000px;
            }
        }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background-color: var(--primary-green);
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 50px,
                    rgba(254, 219, 91, 0.03) 50px,
                    rgba(254, 219, 91, 0.03) 100px
                );
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            font-size: 2rem;
            opacity: 0.08;
            pointer-events: none;
            z-index: 1;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: float 6s ease-in-out infinite;
        }

        header {
            background: var(--primary-green);
            border-bottom: 4px solid var(--primary-yellow);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .header-logo {
            height: 72px;
            width: auto;
            display: block;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header-logo:hover {
            transform: scale(1.05);
        }

        .header-spacer {
            flex: 1;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            position: relative;
            padding: 0.8rem 1.8rem;
            background: var(--primary-yellow);
            color: var(--primary-green);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            border: 3px solid var(--primary-green);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.3);
        }

        .nav-btn:active {
            transform: translateY(0px);
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
        }

        .nav-btn.active {
            background: var(--primary-green);
            color: var(--primary-yellow);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .view {
            display: none;
            animation: slide-in-up 0.6s ease-out;
        }

        .view.active {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* ===== ROULETTE VIEW ===== */
        .roulette-view {
            flex: 1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero-title {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 3px;
            line-height: 1.1;
            color: var(--primary-yellow);
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
        }

        .hero-tagline {
            font-size: 16px;
            color: var(--primary-yellow);
            margin-bottom: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            margin-bottom: 3rem;
        }

        @media (min-width: 1024px) {
            .content-grid {
                grid-template-columns: 300px 1fr;
                gap: 4rem;
                align-items: start;
            }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .filter-section {
            background: var(--primary-yellow);
            border: 3px solid var(--primary-green);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .filter-section:hover {
            transform: translateY(-2px);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.25);
        }

        .filter-section h3 {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .filter-btn {
            padding: 0.6rem 0.9rem;
            border: 2px solid var(--primary-green);
            background: var(--light-cream);
            color: var(--primary-green);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 6px;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.15);
        }

        .filter-btn.active {
            background: var(--primary-green);
            color: var(--primary-yellow);
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .roulette-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        .roulette-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            background: var(--primary-yellow);
            border: 4px solid var(--primary-green);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.3);
            clip-path: polygon(
                0 30px, 30px 0, calc(100% - 30px) 0, 100% 30px, 
                100% calc(100% - 30px), calc(100% - 30px) 100%, 
                30px 100%, 0 calc(100% - 30px)
            );
        }

        .roulette-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .roulette-wrapper:hover {
            transform: scale(1.03);
        }

        .roulette-needle {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--primary-green);
            z-index: 10;
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.3));
        }

        svg#rouletteSvg {
            width: 100%;
            height: 100%;
            cursor: pointer;
            will-change: transform;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.2));
        }

        svg#rouletteSvg:active {
            cursor: pointer;
        }

        .spin-button {
            position: relative;
            padding: 1.3rem 3.5rem;
            background: var(--primary-yellow);
            color: var(--primary-green);
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            border: 3px solid var(--primary-green);
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .spin-button:hover {
            transform: translateY(-3px);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.3);
        }

        .spin-button:active {
            transform: translateY(-1px);
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
        }

        .spin-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: var(--primary-yellow);
            border: 3px solid var(--primary-green);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.25);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-green);
            font-family: 'Space Mono', monospace;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--primary-green);
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        /* ===== MODAL STYLES ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 56, 34, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--primary-yellow);
            border: 4px solid var(--primary-green);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 45px;
            height: 45px;
            background: var(--primary-green);
            border: 2px solid var(--primary-yellow);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary-yellow);
            transition: all 0.2s ease;
            z-index: 10;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }

        .modal-emoji {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-subtitle {
            color: var(--primary-green);
            font-size: 14px;
            font-weight: 600;
        }

        .modal-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }

        .detail-item {
            background: var(--light-cream);
            padding: 1rem;
            border-radius: 10px;
            border: 2px solid var(--primary-green);
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .detail-item:hover {
            transform: translateY(-2px);
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.15);
        }

        .detail-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--primary-green);
            letter-spacing: 0.5px;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-green);
        }

        .modal-description {
            background: var(--light-cream);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 2;
            font-style: italic;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            position: relative;
            z-index: 2;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--primary-green);
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.1);
        }

        .modal-btn-primary {
            background: var(--primary-green);
            color: var(--primary-yellow);
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.15);
        }

        .modal-btn-secondary {
            background: var(--light-cream);
            color: var(--primary-green);
        }

        .modal-btn-secondary:hover {
            background: var(--primary-yellow);
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.15);
        }

        .modal-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== VISITS VIEW ===== */
        .visits-container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 16px;
            color: var(--primary-yellow);
            border: 3px dashed var(--primary-yellow);
            background: var(--primary-green);
            border-radius: 12px;
            animation: slide-in-up 0.6s ease-out;
        }

        .empty-state p {
            margin-bottom: 1.5rem;
        }

        .empty-state-btn {
            display: inline-block;
            padding: 0.9rem 2rem;
            background: var(--primary-yellow);
            color: var(--primary-green);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1px;
            border: 3px solid var(--primary-yellow);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
        }

        .empty-state-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.3);
        }

        .visits-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 3px solid var(--primary-yellow);
            border-radius: 12px;
            overflow: hidden;
            animation: slide-in-up 0.6s ease-out;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
        }

        .visit-item {
            background: var(--primary-yellow);
            border-bottom: 2px solid var(--primary-green);
        }

        .visit-item:last-child {
            border-bottom: none;
        }

        .visit-row {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.5rem;
            gap: 1rem;
            cursor: pointer;
            background: var(--primary-yellow);
            transition: all 0.2s ease;
        }

        .visit-row:hover {
            background: #fce8a6;
        }

        .visit-name {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            flex: 1;
            color: var(--primary-green);
            letter-spacing: 0.5px;
        }

        .visit-stars {
            color: var(--primary-green);
            font-size: 18px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .visit-stars .empty-star {
            color: #d4af37;
            opacity: 0.3;
        }

        .expand-btn {
            background: var(--primary-green);
            border: none;
            color: var(--primary-yellow);
            width: 36px;
            height: 36px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            border-radius: 4px;
            font-weight: 700;
        }

        .expand-btn:hover {
            background: var(--primary-yellow);
            color: var(--primary-green);
            transform: translateY(-2px);
        }

        .visit-details {
            display: none;
            padding: 1.5rem;
            background: var(--light-cream);
            border-top: 2px solid var(--primary-green);
            flex-direction: column;
            gap: 1rem;
            animation: expand 0.3s ease-out;
        }

        .visit-details.open {
            display: flex;
        }

        .detail-row {
            display: flex;
            gap: 1rem;
            font-size: 13px;
            align-items: flex-start;
        }

        .detail-row .detail-label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
            color: var(--primary-green);
            width: 100px;
            flex-shrink: 0;
            font-family: 'Space Mono', monospace;
        }

        .detail-row .detail-value {
            color: var(--primary-green);
            flex: 1;
            font-family: 'Bricolage Grotesque', sans-serif;
        }

        .detail-note {
            font-style: italic;
            color: var(--accent-gray);
        }

        .edit-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed var(--primary-green);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .edit-section label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary-green);
            display: block;
            font-family: 'Space Mono', monospace;
        }

        .star-picker {
            display: flex;
            gap: 0.5rem;
        }

        .star {
            font-size: 1.5rem;
            cursor: pointer;
            color: #d4af37;
            opacity: 0.4;
            transition: all 0.15s ease;
        }

        .star.filled {
            color: var(--primary-green);
            opacity: 1;
            transform: scale(1.2);
        }

        .star:hover {
            transform: scale(1.3);
            opacity: 1;
        }

        .edit-section textarea {
            padding: 0.8rem;
            border: 2px solid var(--primary-green);
            border-radius: 6px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 13px;
            resize: vertical;
            background: var(--white);
            color: var(--primary-green);
        }

        .detail-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-edit, .btn-delete, .btn-save, .btn-cancel {
            padding: 0.6rem 1rem;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: 2px solid var(--primary-green);
            border-radius: 6px;
            transition: all 0.15s ease;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        .btn-edit {
            background: var(--white);
            color: var(--primary-green);
        }

        .btn-edit:hover { 
            background: var(--primary-green);
            color: var(--primary-yellow);
            transform: translateY(-2px);
        }

        .btn-delete {
            background: var(--white);
            color: var(--primary-green);
            margin-left: auto;
        }

        .btn-delete:hover { 
            background: #c0392b;
            border-color: #c0392b;
            color: white;
            transform: translateY(-2px);
        }

        .btn-save {
            background: var(--primary-green);
            color: var(--primary-yellow);
        }

        .btn-save:hover { 
            background: var(--primary-yellow);
            color: var(--primary-green);
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: var(--white);
            color: var(--primary-green);
        }

        .btn-cancel:hover { 
            background: var(--light-cream);
            transform: translateY(-2px);
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 150;
        }

        footer {
            background: var(--primary-green);
            border-top: 4px solid var(--primary-yellow);
            padding: 2rem;
            text-align: center;
            color: var(--primary-yellow);
            font-size: 12px;
            margin-top: auto;
            box-shadow: 0 -8px 16px rgba(0, 0, 0, 0.2);
        }

        footer a {
            color: var(--primary-yellow);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 700;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 1.8rem;
            }

            .modal-content {
                padding: 2rem;
            }

            .modal-title {
                font-size: 1.6rem;
            }

            .modal-details {
                grid-template-columns: 1fr;
            }

            .spin-button {
                padding: 1rem 2rem;
                font-size: 15px;
            }

            .visit-row {
                padding: 1rem;
            }

            .detail-row {
                flex-direction: column;
                gap: 0.25rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="assets/img/logotipo_principal.svg" alt="Taco Roulette" class="header-logo" onclick="switchView('roulette')">
            <div class="header-spacer"></div>
            <div class="nav-buttons">
                <button class="nav-btn active" id="rouletteNavBtn" onclick="switchView('roulette')">Ruleta</button>
                <button class="nav-btn" id="visitsNavBtn" onclick="switchView('visits')">Mis Visitas (<span id="visitsCountNav">0</span>)</button>
            </div>
        </div>
    </header>

    <main>
        <!-- ROULETTE VIEW -->
        <div id="rouletteView" class="view active roulette-view">
            <div class="container">
                <div class="hero">
                    <h1 class="hero-title">GIRA LA RULETA</h1>
                    <p class="hero-tagline">Descubre tu próxima taquería favorita en Monterrey</p>
                </div>

                <div class="content-grid">
                    <!-- SIDEBAR FILTERS -->
                    <div class="sidebar">
                        <div class="filter-section">
                            <h3>Presupuesto</h3>
                            <div class="filter-buttons">
                                <button class="filter-btn" data-filter="budget" data-value="$">$</button>
                                <button class="filter-btn" data-filter="budget" data-value="$$">$$</button>
                                <button class="filter-btn" data-filter="budget" data-value="$$$">$$$</button>
                            </div>
                        </div>

                        <div class="filter-section">
                            <h3>Tipo</h3>
                            <div class="filter-buttons">
                                <button class="filter-btn" data-filter="types" data-value="Carne Asada">Asada</button>
                                <button class="filter-btn" data-filter="types" data-value="Barbacoa">Barbacoa</button>
                                <button class="filter-btn" data-filter="types" data-value="Pastor">Pastor</button>
                                <button class="filter-btn" data-filter="types" data-value="Varios">Varios</button>
                            </div>
                        </div>

                        <div class="filter-section">
                            <h3>Zona</h3>
                            <div class="filter-buttons">
                                <button class="filter-btn" data-filter="location" data-value="Monterrey">Centro</button>
                                <button class="filter-btn" data-filter="location" data-value="San Pedro">San Pedro</button>
                                <button class="filter-btn" data-filter="location" data-value="Guadalupe">Guadalupe</button>
                                <button class="filter-btn" data-filter="location" data-value="Santa Catarina">Santa C.</button>
                                <button class="filter-btn" data-filter="location" data-value="San Nicolás">San Nico.</button>
                            </div>
                        </div>
                    </div>

                    <!-- MAIN CONTENT -->
                    <div class="main-content">
                        <div class="roulette-section">
                            <div class="roulette-container">
                                <div class="roulette-wrapper">
                                    <div class="roulette-needle"></div>
                                    <svg id="rouletteSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
                                </div>
                            </div>
                            <button id="spinBtn" class="spin-button">GIRA LA RULETA</button>
                        </div>

                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-number" id="totalTacerias">15</div>
                                <div class="stat-label">Taquerías</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="visitedCount">0</div>
                                <div class="stat-label">Visitadas</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="remainingCount">15</div>
                                <div class="stat-label">Por Visitar</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VISITS VIEW -->
        <div id="visitsView" class="view">
            <div class="visits-container">
                <div id="visitsContent"></div>
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div id="taceriaModal" class="modal-overlay">
        <div class="modal-content">
            <button id="modalClose" class="modal-close">&times;</button>

            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title">Taquería</h2>
                <p id="modalLocation" class="modal-subtitle">Ubicación</p>
            </div>

            <div class="modal-details">
                <div class="detail-item">
                    <div class="detail-label">Presupuesto</div>
                    <div id="modalBudget" class="detail-value">$$</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Especialidad</div>
                    <div id="modalTypes" class="detail-value">Varios</div>
                </div>
            </div>

            <div id="modalDescription" class="modal-description">
                Descripción de la taquería
            </div>

            <div class="modal-buttons">
                <button id="visitBtn" class="modal-btn modal-btn-primary">MARCAR VISITADA</button>
                <button id="spinAgainBtn" class="modal-btn modal-btn-secondary">Otra Más</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Hecho en Monterrey para los amantes de los tacos © <span id="year"></span></p>
    </footer>

    <script>
        // ===== BASE DE DATOS =====
        const TACERIAS_DB = [
            { id: 1, name: 'El Primazo', location: 'Monterrey', budget: '$$', types: ['Pastor', 'Carne Asada'], description: 'El clásico de Monterrey desde 1985. Los tacos de pastor son legendarios.' },
            { id: 2, name: 'Tacos del Muerto', location: 'San Pedro', budget: '$', types: ['Barbacoa', 'Carne Asada'], description: 'Barbacoa de madrugada que te cambia la vida. Abierto casi 24/7.' },
            { id: 3, name: 'La Mexicana', location: 'Santa Catarina', budget: '$$', types: ['Varios', 'Pastor'], description: 'Variedad sin igual. Desde tacos clásicos hasta opciones gourmet.' },
            { id: 4, name: 'Tacos Popo\'s', location: 'Guadalupe', budget: '$', types: ['Carne Asada'], description: 'El favorito de los locales. Carne de primera calidad y servicio rápido.' },
            { id: 5, name: 'Orinoco', location: 'San Nicolás', budget: '$$$', types: ['Barbacoa', 'Varios'], description: 'Experiencia premium con los mejores ingredientes. Ambiente sofisticado.' },
            { id: 6, name: 'El Tacote', location: 'Monterrey', budget: '$$', types: ['Pastor', 'Carne Asada'], description: 'Porciones generosas que no caben en tu boca. Los gorditos son de otro mundo.' },
            { id: 7, name: 'Casa Taco', location: 'San Pedro', budget: '$', types: ['Barbacoa'], description: 'Especialistas en barbacoa desde hace 20 años. Consomé incluido.' },
            { id: 8, name: 'Taquería Viva', location: 'Guadalupe', budget: '$$', types: ['Varios'], description: 'Todo lo que quieras, hecho al momento. Menu extenso.' },
            { id: 9, name: 'Los Cuates', location: 'Santa Catarina', budget: '$', types: ['Carne Asada', 'Pastor'], description: 'Auténtico y sabroso. Tortillas hechas a mano con receta de generaciones.' },
            { id: 10, name: 'Delicias Norteñas', location: 'San Nicolás', budget: '$$', types: ['Barbacoa', 'Carne Asada'], description: 'Lo mejor de la región. Carne de res de la mejor calidad.' },
            { id: 11, name: 'Taco King', location: 'Monterrey', budget: '$$$', types: ['Varios'], description: 'Gourmet y creativo. Tacos con fusiones interesantes. Experiencia memorable.' },
            { id: 12, name: 'El Fuerte', location: 'San Pedro', budget: '$$', types: ['Carne Asada'], description: 'Carne de primera. Asada al carbón con leña. Salsas caseras irresistibles.' },
            { id: 13, name: 'Sabor Regio', location: 'Guadalupe', budget: '$', types: ['Pastor', 'Varios'], description: 'Regiomontano hasta el tuétano. Comida de casa, pero en la calle.' },
            { id: 14, name: 'La Colmena', location: 'Santa Catarina', budget: '$$', types: ['Barbacoa'], description: 'Dulce y sabroso. Barbacoa cocinada en horno de barro.' },
            { id: 15, name: 'Noche de Tacos', location: 'San Nicolás', budget: '$', types: ['Pastor', 'Carne Asada', 'Barbacoa'], description: 'La mejor opción nocturna. Abierto desde las 7pm hasta las 2am.' }
        ];

        let filters = { budget: [], types: [], location: [] };
        let currentRotation = 0;
        let isSpinning = false;
        let selectedTaceria = null;
        let idleAnimFrame = null;

        // ===== VIEW SWITCHING =====
        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewName + 'View').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(viewName + 'NavBtn').classList.add('active');

            if (viewName === 'visits') {
                renderVisitsPage();
            }
        }

function startIdleSpin() {
            rouletteSvg.style.transition = 'none';
            function tick() {
                currentRotation += 0.1;
                rouletteSvg.style.transform = `rotate(${currentRotation}deg)`;
                idleAnimFrame = requestAnimationFrame(tick);
            }
            idleAnimFrame = requestAnimationFrame(tick);
        }

        function stopIdleSpin() {
            if (idleAnimFrame) {
                cancelAnimationFrame(idleAnimFrame);
                idleAnimFrame = null;
            }
        }

        // ===== RULETTE FUNCTIONS =====
        const spinBtn = document.getElementById('spinBtn');
        const rouletteSvg = document.getElementById('rouletteSvg');
        const taceriaModal = document.getElementById('taceriaModal');
        const modalClose = document.getElementById('modalClose');
        const visitBtn = document.getElementById('visitBtn');
        const spinAgainBtn = document.getElementById('spinAgainBtn');
        const visitsCountNav = document.getElementById('visitsCountNav');

        function getFilteredTacerias() {
            return TACERIAS_DB.filter(taceria => {
                if (filters.budget.length > 0 && !filters.budget.includes(taceria.budget)) return false;
                if (filters.types.length > 0 && !taceria.types.some(t => filters.types.includes(t))) return false;
                if (filters.location.length > 0 && !filters.location.includes(taceria.location)) return false;
                return true;
            });
        }

        function renderRoulette() {
            const filtered = getFilteredTacerias();
            if (filtered.length === 0) {
                spinBtn.disabled = true;
                rouletteSvg.innerHTML = '<text x="200" y="200" text-anchor="middle" font-size="18" fill="#0F3822" font-family="Space Mono">Sin opciones</text>';
                return;
            }
            spinBtn.disabled = false;

            const sliceAngle = 360 / filtered.length;
            const colors = ['#FEDB5B', '#0F3822'];
            rouletteSvg.innerHTML = '';

            filtered.forEach((taceria, index) => {
                const startAngle = (index * sliceAngle - 90) * (Math.PI / 180);
                const endAngle = ((index + 1) * sliceAngle - 90) * (Math.PI / 180);

                const x1 = 200 + 200 * Math.cos(startAngle);
                const y1 = 200 + 200 * Math.sin(startAngle);
                const x2 = 200 + 200 * Math.cos(endAngle);
                const y2 = 200 + 200 * Math.sin(endAngle);

                const isLarge = sliceAngle > 180 ? 1 : 0;
                const bgColor = colors[index % 2];
                const textColor = index % 2 === 0 ? '#0F3822' : '#FEDB5B';

                const pathStr = `M 200 200 L ${x1} ${y1} A 200 200 0 ${isLarge} 1 ${x2} ${y2} Z`;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathStr);
                path.setAttribute('fill', bgColor);
                path.setAttribute('stroke', '#0F3822');
                path.setAttribute('stroke-width', '3');
                rouletteSvg.appendChild(path);

                const midAngle = (startAngle + endAngle) / 2;
                const midAngleDeg = midAngle * (180 / Math.PI);
                const textX = 200 + 120 * Math.cos(midAngle);
                const textY = 200 + 120 * Math.sin(midAngle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', textX);
                text.setAttribute('y', textY);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('fill', textColor);
                text.setAttribute('font-size', '11');
                text.setAttribute('font-weight', '700');
                text.setAttribute('font-family', 'Space Mono, monospace');
                text.setAttribute('transform', `rotate(${midAngleDeg}, ${textX}, ${textY})`);
                text.textContent = taceria.name.toUpperCase().substring(0, 14);
                rouletteSvg.appendChild(text);
            });

            updateStats();
        }

        function spin() {
            if (isSpinning) return;

            const filtered = getFilteredTacerias();
            if (filtered.length === 0) return;

            isSpinning = true;
            spinBtn.disabled = true;
            stopIdleSpin();

            const randomSpin = Math.random() * 360 + 1800;
            const selectedIndex = Math.floor((randomSpin % 360) / (360 / filtered.length));
            selectedTaceria = filtered[selectedIndex];

            currentRotation += randomSpin;
            rouletteSvg.style.transition = 'transform 3.5s cubic-bezier(0.2, 0.0, 0.0, 1.0)';
            rouletteSvg.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                showTaceriaModal();
                startIdleSpin();
            }, 3500);
        }

        function showTaceriaModal() {
            document.getElementById('modalTitle').textContent = selectedTaceria.name;
            document.getElementById('modalLocation').textContent = selectedTaceria.location;
            document.getElementById('modalBudget').textContent = selectedTaceria.budget;
            document.getElementById('modalTypes').textContent = selectedTaceria.types.join(', ');
            document.getElementById('modalDescription').textContent = `"${selectedTaceria.description}"`;

            const visits = JSON.parse(localStorage.getItem('taco_visits') || '{}');
            const isVisited = !!visits[selectedTaceria.id];
            visitBtn.disabled = isVisited;
            visitBtn.textContent = isVisited ? 'VISITADA' : 'MARCAR VISITADA';

            taceriaModal.classList.add('active');
        }

        function hideTaceriaModal() {
            taceriaModal.classList.remove('active');
        }

        function markAsVisited() {
            const visits = JSON.parse(localStorage.getItem('taco_visits') || '{}');
            visits[selectedTaceria.id] = { ...selectedTaceria, visitedDate: new Date().toISOString() };
            localStorage.setItem('taco_visits', JSON.stringify(visits));
            updateVisitsButton();
            updateStats();
            visitBtn.disabled = true;
            visitBtn.textContent = 'VISITADA';
        }

        function updateVisitsButton() {
            const visits = JSON.parse(localStorage.getItem('taco_visits') || '{}');
            const count = Object.keys(visits).length;
            visitsCountNav.textContent = count;
        }

        function updateStats() {
            const visits = JSON.parse(localStorage.getItem('taco_visits') || '{}');
            const visitedCount = Object.keys(visits).length;
            const filtered = getFilteredTacerias();
            
            document.getElementById('totalTacerias').textContent = filtered.length;
            document.getElementById('visitedCount').textContent = visitedCount;
            document.getElementById('remainingCount').textContent = Math.max(0, filtered.length - visitedCount);
        }

        // ===== VISITS PAGE =====
        function formatDate(isoString) {
            if (!isoString) return '—';
            const d = new Date(isoString);
            return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function starsHTML(rating) {
            if (!rating) return '<span style="color:var(--primary-green);font-size:12px;">Sin calificación</span>';
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += i <= rating ? '★' : '<span class="empty-star">★</span>';
            }
            return html;
        }

        function renderVisitsPage() {
            const visits = JSON.parse(localStorage.getItem('taco_visits') || '{}');
            const reviews = JSON.parse(localStorage.getItem('taco_reviews') || '{}');
            const content = document.getElementById('visitsContent');
            const items = Object.values(visits);

            if (items.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <p>Aún no has visitado ninguna taquería.</p>
                        <button class="empty-state-btn" onclick="switchView('roulette')">← Volver a Girar</button>
                    </div>`;
                return;
            }

            items.sort((a, b) => new Date(b.visitedDate) - new Date(a.visitedDate));

            const listHTML = items.map(taceria => {
                const review = reviews[taceria.id] || { rating: 0, comment: '' };
                const id = taceria.id;
                return `
                <li class="visit-item" id="item-${id}">
                    <div class="visit-row" onclick="toggleDetail(${id})">
                        <span class="visit-name">${taceria.name}</span>
                        <span class="visit-stars">${starsHTML(review.rating)}</span>
                        <button class="expand-btn" id="btn-${id}" onclick="event.stopPropagation(); toggleDetail(${id})" title="Ver detalles">▼</button>
                    </div>
                    <div class="visit-details" id="detail-${id}">
                        <div class="detail-row">
                            <span class="detail-label">Ubicación</span>
                            <span class="detail-value">${taceria.location || '—'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Precio</span>
                            <span class="detail-value">${taceria.budget || '—'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Tacos</span>
                            <span class="detail-value">${Array.isArray(taceria.types) ? taceria.types.join(', ') : (taceria.types || '—')}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Descripción</span>
                            <span class="detail-value detail-note">${taceria.description || '—'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Visitada</span>
                            <span class="detail-value">${formatDate(taceria.visitedDate)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Notas</span>
                            <span class="detail-value detail-note" id="note-text-${id}">${review.comment ? '"' + review.comment + '"' : '—'}</span>
                        </div>
                        <div id="edit-form-${id}" style="display:none;">
                            <div class="edit-section">
                                <div>
                                    <label>Calificación</label>
                                    <div class="star-picker" id="stars-${id}">
                                        ${[1,2,3,4,5].map(i => `
                                            <span class="star ${i <= (review.rating || 0) ? 'filled' : ''}"
                                                  data-val="${i}"
                                                  onclick="setRating(${id}, ${i})">★</span>
                                        `).join('')}
                                    </div>
                                </div>
                                <div>
                                    <label>Notas</label>
                                    <textarea id="textarea-${id}" rows="3" maxlength="200" placeholder="Tu experiencia...">${review.comment || ''}</textarea>
                                </div>
                                <div class="detail-actions">
                                    <button class="btn-save" onclick="saveReview(${id})">Guardar</button>
                                    <button class="btn-cancel" onclick="cancelEdit(${id})">Cancelar</button>
                                </div>
                            </div>
                        </div>
                        <div class="detail-actions">
                            <button class="btn-edit" id="edit-btn-${id}" onclick="startEdit(${id})">
                                ${review.comment ? 'Editar reseña' : 'Añadir reseña'}
                            </button>
                            <button class="btn-delete" onclick="deleteVisit(${id})">Eliminar</button>
                        </div>
                    </div>
                </li>`;
            }).join('');

            content.innerHTML = `<ul class="visits-list">${listHTML}</ul>`;

            window._ratings = {};
            items.forEach(t => {
                const r = reviews[t.id] || {};
                window._ratings[t.id] = r.rating || 0;
            });
        }

        function toggleDetail(id) {
            const detail = document.getElementById(`detail-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            const isOpen = detail.classList.contains('open');
            detail.classList.toggle('open', !isOpen);
            btn.classList.toggle('open', !isOpen);
            btn.textContent = isOpen ? '▼' : '▲';
        }

        function startEdit(id) {
            document.getElementById(`edit-form-${id}`).style.display = 'block';
            document.getElementById(`edit-btn-${id}`).style.display = 'none';
        }

        function cancelEdit(id) {
            document.getElementById(`edit-form-${id}`).style.display = 'none';
            document.getElementById(`edit-btn-${id}`).style.display = '';
            const reviews = JSON.parse(localStorage.getItem('taco_reviews') || '{}');
            const saved = (reviews[id] || {}).rating || 0;
            window._ratings[id] = saved;
            updateStarDisplay(id, saved);
        }

        function setRating(id, val) {
            window._ratings = window._ratings || {};
            window._ratings[id] = val;
            updateStarDisplay(id, val);
        }

        function updateStarDisplay(id, rating) {
            document.querySelectorAll(`#stars-${id} .star`).forEach(s => {
                s.classList.toggle('filled', parseInt(s.dataset.val) <= rating);
            });
        }

        function saveReview(id) {
            const reviews = JSON.parse(localStorage.getItem('taco_reviews') || '{}');
            const comment = document.getElementById(`textarea-${id}`).value.trim();
            const rating = (window._ratings || {})[id] || 0;
            reviews[id] = { rating, comment, date: new Date().toISOString() };
            localStorage.setItem('taco_reviews', JSON.stringify(reviews));
            renderVisitsPage();
            requestAnimationFrame(() => {
                const detail = document.getElementById(`detail-${id}`);
                const btn = document.getElementById(`btn-${id}`);
                if (detail && btn) {
                    detail.classList.add('open');
                    btn.classList.add('open');
                    btn.textContent = '▲';
                }
            });
        }

        function deleteVisit(id) {
            if (!confirm('¿Eliminar esta visita?')) return;
            const visits = JSON.parse(localStorage.getItem('taco_visits') || '{}');
            const reviews = JSON.parse(localStorage.getItem('taco_reviews') || '{}');
            delete visits[id];
            delete reviews[id];
            localStorage.setItem('taco_visits', JSON.stringify(visits));
            localStorage.setItem('taco_reviews', JSON.stringify(reviews));
            updateVisitsButton();
            updateStats();
            renderVisitsPage();
        }

        // ===== EVENT LISTENERS =====
        spinBtn.addEventListener('click', spin);
        rouletteSvg.addEventListener('click', spin);
        modalClose.addEventListener('click', hideTaceriaModal);
        visitBtn.addEventListener('click', markAsVisited);
        spinAgainBtn.addEventListener('click', hideTaceriaModal);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const filterType = e.target.dataset.filter;
                const filterValue = e.target.dataset.value;

                if (filters[filterType].includes(filterValue)) {
                    filters[filterType] = filters[filterType].filter(v => v !== filterValue);
                } else {
                    filters[filterType].push(filterValue);
                }

                e.target.classList.toggle('active');
                renderRoulette();
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideTaceriaModal();
        });

        document.getElementById('year').textContent = new Date().getFullYear();
        renderRoulette();
        updateVisitsButton();
        updateStats();
        startIdleSpin();
    </script>
</body>
</html>
